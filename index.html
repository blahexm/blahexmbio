<!DOCTYPE html>
<html lang="en" data-theme="rose">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>blahexm</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<!-- Header -->
<header>
  <div class="header-inner">
    <button class="tab-btn active" id="tab-profile" onclick="showTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      profile
    </button>
    <button class="tab-btn" id="tab-music" onclick="showTab('music')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      music
    </button>
    <!-- Stats tab → เปิดหน้า dashboard แยก -->
    <a class="tab-btn" href="hub.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      stats
    </a>
  </div>
</header>

<main>

  <!-- ══ PAGE: PROFILE ══ -->
  <div class="page active" id="page-profile">
    <div class="card">
      <div class="avatar-wrap">
        <img class="avatar" id="avatar"
          src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 86 86'%3E%3Ccircle cx='43' cy='43' r='43' fill='%231a1a1a'/%3E%3C/svg%3E"
          alt="avatar"/>
        <div class="avatar-ring"></div>
        <div class="status-dot" id="status-dot"></div>
      </div>

      <div class="name-row">
        <div class="profile-name" id="profile-name">blahexm</div>
        <div class="badge" id="badge"></div>
      </div>

      <div class="profile-bio" id="profile-bio"></div>

      <div class="status-label" id="status-label">
        <span class="dot"></span>
        <span id="status-text">connecting...</span>
      </div>

      <div class="activity" id="activity">
        <div class="activity-icon" id="activity-icon">🎮</div>
        <div class="activity-info">
          <div class="activity-type"   id="activity-type">Playing</div>
          <div class="activity-detail" id="activity-detail">...</div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="socials" id="socials"></div>

      <div class="music-bar" id="music-bar">
        <button class="music-play-btn" onclick="toggleMusic()">
          <svg id="play-icon"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="music-info">
          <div class="music-title"  id="music-title">—</div>
          <div class="music-artist" id="music-artist"></div>
        </div>
        <div class="music-viz paused" id="music-viz">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ PAGE: MUSIC ══ -->
  <div class="page" id="page-music">
    <div class="card">
      <div class="music-page-header">
        <div class="music-page-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          favorite tracks
        </div>
        <div class="music-page-sub">กดเล่นได้เลย</div>
      </div>
      <div class="music-grid" id="music-grid"></div>
    </div>
  </div>

</main>

<footer><p class="footer-text" id="footer-text">blahexm · 2026</p></footer>
<audio id="audio" loop></audio>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
